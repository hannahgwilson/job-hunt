metric: pass_through_rate
label: Stage pass-through rate
description: >
  Of the applications that got a DECISION at a funnel stage, the fraction that
  advanced to the next stage. Unlike conversion_rate, the denominator excludes
  applications still awaiting a decision (pending) — so the rate reflects only
  resolved outcomes and doesn't drift as the waiting ones land. This is the
  "how well am I converting at this step" number.
owner: hannah
grain: one funnel stage
unit: ratio   # 0..1, e.g. 0.5 == 50%

source:
  table: [application_status_history, applications]
  columns: [application_id, to_status, from_status, changed_at, status]
  notes: >
    Needs the application's CURRENT status (applications.status) to tell a still-
    pending app apart from one that died at the stage. A stage transition into
    'rejected'/'withdrawn' is a "no" decision; reaching the next stage is a "yes".

definition: >
  For each forward stage S (with a next stage), classify every application that
  reached S into exactly one of:
    moved_on        — also reached the next stage
    terminated_here — ended 'rejected'/'withdrawn' without reaching the next stage
    pending         — still active at/at-or-before S, no decision yet (kept aside)
  ('closed' = role filled/pulled and 'accepted'/'draft' are set aside too — not a
  verdict on this stage.)
  pass_through_rate = moved_on / (moved_on + terminated_here)
  Null when no application has been decided at S yet (denominator 0). The 'accepted'
  stage is terminal (no next), so it has no rate.

# Worked example (3 apps, all reached 'applied'): 1 advanced to screening,
# 1 rejected at applied, 1 still waiting →
#   applied: total_ever 3, moved_on 1, terminated_here 1, pending 1,
#            rate = 1 / (1 + 1) = 0.5   ("50% (1/2)", Pending: 1)
# conversion_rate on the same data is 1/3 = 0.33 (it counts the pending app).

stage_order: [applied, screening, interviewing, offer, accepted]

dimensions:
  - window_days   # restrict to transitions within the last N days
  - stage         # which forward stage

implemented_by:
  function: get_funnel_metrics(p_window_days int, p_user_id uuid)
  file: functions.sql
  returns_key: pass_through   # { <stage>: { total_ever, moved_on, terminated_here, pending, rate } }
  surfaced_in:
    - web/src/pages/Dashboard.tsx   # per-stage "total · pass-thru % (n/d) · pending"
    - MCP tool get_funnel_metrics

interpretation: >
  The honest conversion number: it ignores in-flight applications, so a single
  rejection doesn't look like a low rate just because other apps haven't been
  decided. Read with the raw counts — "50% (1/2)" over two decisions is one
  rejection, not a trend. Pending is shown alongside so the in-flight load is
  visible, not hidden in the rate.

related:
  - conversion_rate   # same funnel, but denominator = everyone who EVER reached the stage (pending included)

caveats:
  - Denominator is decisions, not volume — tiny at the bottom of the funnel.
    Two decisions make the rate 0/50/100; lead with the counts.
  - 'closed' (role filled/pulled) is set aside, not counted as a "no" — it isn't
    a verdict on the candidate.
  - Mirror of the classification lives in get_funnel_metrics; keep the stage list
    and the set-aside statuses in sync if either changes.
